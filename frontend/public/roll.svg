<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer wrapper -->
  <g transform="translate(100, 100) rotate(-20)">
    <!-- Rice paper wrapper - light color with texture -->
    <ellipse cx="0" cy="-30" rx="45" ry="30" fill="#F5DEB3"/>
    <ellipse cx="0" cy="0" rx="48" ry="32" fill="#F0E68C"/>
    <ellipse cx="0" cy="30" rx="45" ry="30" fill="#F5DEB3"/>
    
    <!-- Wrapper details/creases -->
    <path d="M -40 -25 Q -35 0 -40 30" fill="none" stroke="#DEB887" stroke-width="1.5" opacity="0.5"/>
    <path d="M 40 -25 Q 35 0 40 30" fill="none" stroke="#DEB887" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Vegetable filling showing -->
    <!-- Carrot strips -->
    <ellipse cx="-15" cy="-10" rx="8" ry="18" fill="#FF8C00"/>
    <ellipse cx="15" cy="5" rx="8" ry="18" fill="#FF6347"/>
    
    <!-- Cabbage/lettuce -->
    <ellipse cx="0" cy="-5" rx="12" ry="20" fill="#90EE90"/>
    <path d="M -5 -15 Q 0 -8 5 -15" fill="#7CFC00" opacity="0.7"/>
    
    <!-- Cucumber -->
    <ellipse cx="-8" cy="15" rx="10" ry="20" fill="#98D98E"/>
    <ellipse cx="8" cy="20" rx="10" ry="20" fill="#6B8E23"/>
    
    <!-- Sauce dots for garnish -->
    <circle cx="-35" cy="0" r="3" fill="#8B4513" opacity="0.6"/>
    <circle cx="35" cy="5" r="3" fill="#A0522D" opacity="0.6"/>
  </g>
  
  <!-- Dipping sauce bowl (bottom right) -->
  <ellipse cx="150" cy="150" rx="30" ry="15" fill="#D4A76A"/>
  <ellipse cx="150" cy="148" rx="28" ry="13" fill="#E8C4A0"/>
  <path d="M 125 148 L 140 155 L 160 155 L 175 148" fill="#C19A6B"/>
  
  <!-- Sauce inside -->
  <ellipse cx="150" cy="150" rx="22" ry="8" fill="#8B4513"/>
</svg>