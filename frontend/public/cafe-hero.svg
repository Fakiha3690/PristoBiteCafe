<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient effect -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4B5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Table surface -->
  <rect x="0" y="200" width="400" height="100" fill="#D2691E" opacity="0.3"/>
  
  <!-- Coffee Cup (Left) -->
  <g transform="translate(80, 120)">
    <!-- Cup body -->
    <path d="M 20 30 L 15 80 Q 15 95 30 100 L 70 100 Q 85 95 85 80 L 80 30 Z" fill="url(#cupGrad)" stroke="#8B7355" stroke-width="2"/>
    <!-- Handle -->
    <path d="M 85 50 Q 115 50 115 75 Q 115 100 85 100" fill="none" stroke="#8B7355" stroke-width="2.5"/>
    <!-- Coffee inside -->
    <ellipse cx="50" cy="35" rx="25" ry="8" fill="#4A3728"/>
    <path d="M 25 35 L 20 80 Q 20 92 30 98" fill="#6B5344" opacity="0.7"/>
    <!-- Saucer -->
    <ellipse cx="50" cy="105" rx="40" ry="12" fill="#E8DCC4"/>
    <ellipse cx="50" cy="104" rx="38" ry="10" fill="#F5E6D3"/>
  </g>
  
  <!-- Plate with food (Right) -->
  <g transform="translate(240, 140)">
    <!-- Plate -->
    <circle cx="0" cy="0" rx="60" ry="15" fill="#F0F8FF" stroke="#B8860B" stroke-width="2"/>
    
    <!-- Burger on plate -->
    <g transform="translate(-20, -15)">
      <!-- Bottom bun -->
      <ellipse cx="0" cy="20" rx="18" ry="12" fill="#D4A574"/>
      <!-- Patty -->
      <ellipse cx="0" cy="8" rx="16" ry="10" fill="#8B4513"/>
      <!-- Cheese -->
      <rect x="-14" y="0" width="28" height="8" fill="#FFD700"/>
      <!-- Top bun -->
      <ellipse cx="0" cy="-8" rx="18" ry="12" fill="#E8C894"/>
      <!-- Sesame seeds -->
      <circle cx="-8" cy="-12" r="2" fill="#F5DEB3"/>
      <circle cx="0" cy="-14" r="2" fill="#F5DEB3"/>
      <circle cx="8" cy="-12" r="2" fill="#F5DEB3"/>
    </g>
    
    <!-- Spring roll on plate -->
    <g transform="translate(25, -12) rotate(25)">
      <ellipse cx="0" cy="0" rx="16" ry="28" fill="#F0E68C"/>
      <ellipse cx="-8" cy="-8" rx="6" ry="15" fill="#FF8C00"/>
      <ellipse cx="8" cy="5" rx="6" ry="15" fill="#90EE90"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <!-- Leaf -->
  <g transform="translate(340, 80)">
    <ellipse cx="0" cy="0" rx="15" ry="25" fill="#228B22" transform="rotate(35)"/>
    <path d="M 0 -20 Q 8 0 0 20" fill="none" stroke="#1a6b1a" stroke-width="1"/>
  </g>
  
  <!-- Cafe name text -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="#8B4513" text-anchor="middle">PréstoBite</text>
  <text x="200" y="65" font-family="Arial, sans-serif" font-size="18" 
        fill="#A0522D" text-anchor="middle">Campus Café</text>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" 
        fill="#5D4E37" text-anchor="middle">Skip the Queue. Enjoy the Bite.</text>
</svg>